<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position: relative; width: 100%; height: 100%;">
  <div style="position: absolute; left: 6px; top: 73px; width: 96px; height: 11px; border-radius: 50%; background: rgba(70,90,75,0.18);"></div>
  <div style="position: absolute; left: {{ spriteLeft }}; top: 0px; width: 150px; height: 116px; transform: {{ spriteTransform }}; transform-origin: top left;">
    <div style="position: absolute; left: 6px; bottom: 14px; width: 9px; height: 42px; border-radius: 4px; background: #8A8170;"></div>
    <div style="position: absolute; left: 6px; bottom: 24px; width: 32px; height: 9px; border-radius: 3px; background: #8A8170;"></div>
    <div style="position: absolute; left: 18px; bottom: 30px; width: 32px; height: 40px; border-radius: 13px 13px 9px 9px; background: {{ body }}; transform: rotate(4deg);"></div>
    <div style="position: absolute; left: 30px; bottom: 62px; width: 28px; height: 28px; border-radius: 50%; background: {{ head }};"><div style="position: absolute; right: 6px; top: 11px; width: 4px; height: 4px; border-radius: 50%; background: #4A443A;"></div></div>
    <div style="position: absolute; left: 44px; bottom: 42px; width: 24px; height: 8px; border-radius: 4px; background: {{ arm }}; transform: rotate(14deg);"></div>
    <div style="position: absolute; left: 62px; bottom: 26px; width: 84px; height: 10px; border-radius: 3px; background: #FFFDF6; box-shadow: 0 3px 0 #C9BC9A;"></div>
    <div style="position: absolute; left: 130px; bottom: 0; width: 9px; height: 26px; background: #D9CCAB; border-radius: 2px;"></div>
    <div style="position: absolute; left: 68px; bottom: 36px; width: 20px; height: 5px; border-radius: 2px; background: #2E3A52;"></div>
    <div style="position: absolute; left: 116px; bottom: 36px; width: 16px; height: 5px; border-radius: 2px; background: #2E3A52;"></div>
    <div style="position: absolute; left: 120px; bottom: 40px; width: 9px; height: 34px; border-radius: 3px; background: #2E3A52; box-shadow: -4px 0 16px 5px {{ glow }};"></div>
    <sc-if value="{{ badgeShow }}" hint-placeholder-val="{{ false }}">
      <div style="position: absolute; left: 30px; bottom: 92px; width: 28px; height: 28px; border-radius: 50%; background: {{ badgeBg }}; border: 3px solid #FFFFFF; color: {{ badgeFg }}; font-family: 'Baloo 2', sans-serif; font-size: 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 7px rgba(60,40,10,0.4);">{{ badge }}</div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;106px&quot;,&quot;height&quot;:&quot;82px&quot;},&quot;facing&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;right&quot;,&quot;left&quot;],&quot;default&quot;:&quot;right&quot;},&quot;body&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#5FA89B&quot;},&quot;head&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#EFC9A2&quot;},&quot;arm&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4E8B80&quot;},&quot;glow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;rgba(79,195,232,0.55)&quot;},&quot;badgeShow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;!&quot;},&quot;badgeBg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F7B731&quot;},&quot;badgeFg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4A3406&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const left = p.facing === 'left';
    return {
      spriteLeft: left ? '105px' : '0px',
      spriteTransform: left ? 'scale(0.7) scaleX(-1)' : 'scale(0.7)',
      body: p.body || '#5FA89B', head: p.head || '#EFC9A2', arm: p.arm || '#4E8B80',
      glow: p.glow || 'rgba(79,195,232,0.55)',
      badgeShow: !!p.badgeShow, badge: p.badge || '!', badgeBg: p.badgeBg || '#F7B731', badgeFg: p.badgeFg || '#4A3406',
    };
  }
}
</script>
</body>
</html>
