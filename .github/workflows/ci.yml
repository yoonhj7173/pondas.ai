name: CI

# main 푸시 + PR에서 백엔드 테스트 + 프론트 빌드를 돌려, 깨진 코드가 배포되는 걸 잡는다.
# (Vercel/Railway는 푸시에 자동 배포 → CI는 그 직후/PR에서 빨간불로 알려줌. PR+branch
#  protection을 켜면 머지 전 게이트가 됨.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python seed.py   # team_templates(카탈로그)+config 시드 — 테스트 FK 의존.
      - run: pytest -p no:warnings -q

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # 빌드 프리렌더가 ClerkProvider를 거쳐서 형식상 키가 필요(런타임 호출 X). 더미 — 실 키 아님.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      CLERK_SECRET_KEY: sk_test_ci_dummy_not_a_real_secret
      NEXT_PUBLIC_API_URL: https://api.pondas.ai
      NEXT_PUBLIC_SITE_URL: https://pondas.ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      E2E_AUTH_BYPASS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend up
        working-directory: backend
        run: |
          pip install -r requirements.txt
          alembic upgrade head
          python seed.py
          python scripts/seed_e2e_fixture.py
          nohup uvicorn app.main:app --port 8000 > /tmp/be.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/ready && break; sleep 1; done
      - name: Frontend up (E2E mode)
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          # Clerk publishable key(공개값) — 없으면 ClerkProvider가 로드되지 않아 전 페이지가
          # Loading에 고착된다(실사고: CI 4/4 실패). E2E 우회는 그 위에서 동작.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dHJ1ZS1rb2RpYWstNjUuY2xlcmsuYWNjb3VudHMuZGV2JA \
          CLERK_SECRET_KEY=sk_test_ci_dummy_not_a_real_secret \
          NEXT_PUBLIC_E2E=1 NEXT_PUBLIC_API_URL=http://localhost:8000 nohup npm run dev > /tmp/fe.log 2>&1 &
          for i in $(seq 1 60); do curl -sf http://localhost:3000/onboarding >/dev/null && break; sleep 2; done
      - name: Playwright
        working-directory: frontend
        run: npx playwright test
      - name: Logs on failure
        if: failure()
        run: |
          echo "=== error contexts ==="
          find frontend/test-results -name "error-context.md" -exec cat {} \; || true
          echo "=== backend log ==="; tail -n 40 /tmp/be.log || true
          echo "=== frontend log ==="; tail -n 40 /tmp/fe.log || true
